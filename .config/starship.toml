"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 1000
add_newline = true

format = """
$directory$git_branch$git_status $cmd_duration $all$time
$character
"""

right_format = ""

[time]
disabled = false

[git_status]
ahead = '‚á°${count}'
diverged = '‚áï‚á°${ahead_count}‚á£${behind_count}'
behind = '‚á£${count}'
stashed = '[*${count} ](bold green)'
staged = '[+${count} ](bold yellow)'
modified = '[!${count} ](bold yellow)'
untracked = '[?${count}](bold blue)'
deleted = '[‚úò${count} ](bold red)'
format = '([$all_status$ahead_behind]($style))'

[character]
success_symbol = '[ ‚ùØ](bold green)'
error_symbol = '[ ‚ùØ](bold red)'

[git_branch]
truncation_length = 26

[directory]
truncation_length = 2
fish_style_pwd_dir_length = 3

[java]
format = '[${symbol}(${version} )](red)'
symbol = 'Óú∏ '

[aws]
disabled = true

[gradle]
format = '[$symbol($version )]($style)'
symbol = 'ÓôÝ '

[nodejs]
format = '[$symbol($version )]($style)'

[package]
format = '[$symbol($version )](208)'
symbol = 'Ôíá '
